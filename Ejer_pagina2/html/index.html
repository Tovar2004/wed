<!DOCTYPE html>
<html lang="es">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tienda - Encabezado</title>
        <link rel="stylesheet" href="../css/styles.css">
        <meta name="description" content="Ejemplo de encabezado estilo tienda con navegación, búsqueda y promoción">
    </head>
    <body>
        <header class="site-header">
            <div class="topbar">
                <div class="topbar-left">
                    <span class="icon-jordan" aria-hidden="true">  </span>
                </div>
                <nav class="topbar-right">
                    <a href="#">Eventos</a>
                    <span class="sep">|</span>
                    <a href="#">Ayuda</a>
                    <span class="sep">|</span>
                    <a href="#">Regístrate</a>
                    <span class="sep">|</span>
                    <a href="#">Buscar tienda</a>
                </nav>
            </div>

            <div class="mainnav">
                <div class="mainnav-inner">
                    <div class="brand">
                        <div class="brand-mark" aria-hidden="true">✔</div>
                        <div class="brand-name">Nike</div>
                    </div>

                    <nav class="nav-center" aria-label="Principal">
                        <ul class="nav-list">
                            <li><a href="#">Novedades</a></li>
                            <li><a href="#">Hombre</a></li>
                            <li><a href="#">Mujer</a></li>
                            <li><a href="#">Niños</a></li>
                            <li><a href="#">Deporte</a></li>
                            <li><a href="#">Descuentos</a></li>
                        </ul>
                    </nav>

                    <div class="actions">
                        <div class="search">
                            <input type="search" placeholder="Buscar" aria-label="Buscar">
                        </div>
                        <button class="cart" aria-label="Carrito">🛍️</button>
                    </div>
                </div>
            </div>

            <div class="promo">
                <p>Envios gratis por compras superiores a <strong>$299.900</strong> <span class="truck">🚚</span>
                    <a href="#">Términos y Condiciones</a>
                </p>
            </div>
        </header>

        <main class="page-content">
            <!-- Contenido de ejemplo -->
            <section style="padding:40px;text-align:center">Contenido de la página</section>
        </main>
    </body>
</html>
